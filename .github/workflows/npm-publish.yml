# ForgeKit Core — npm package publisher for `@forgekit/core-mcp`.
#
# Triggered by pushing a tag matching `v*`. The `validate-tag` job guards
# the pipeline against mismatched package.json / tag versions, and
# `publish-npm` runs the build + test + publish sequence from the
# `mcp-server/` package.
#
# `workflow_dispatch` supports a dry-run mode (`npm publish --dry-run`) so
# maintainers can verify tarball contents without creating a public
# release on npm.

name: npm-publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run `npm publish --dry-run` instead of publishing to the registry."
        type: boolean
        required: false
        default: true
      ref:
        description: "Simulated tag name when dry-running (e.g. v0.0.0). Used only when dry_run is true."
        type: string
        required: false
        default: "v0.0.0"

concurrency:
  group: npm-publish-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  # The publish-npm sanity gate runs the full vitest suite, which
  # includes property tests that shell out to the Godot binary
  # (GDScript validator, input simulator, save-iff-valid). Pin the
  # same Godot version `ci.yml` uses so the publish gate matches CI
  # byte-for-byte.
  GODOT_VERSION: "4.6.2"

jobs:
  # -------------------------------------------------------------------------
  # Shared validation — mirrored from release.yml. Any change here must be
  # mirrored there.
  # -------------------------------------------------------------------------
  validate-tag:
    name: validate-tag
    runs-on: ubuntu-latest
    outputs:
      tag_version: ${{ steps.validate.outputs.tag_version }}
      tag_name: ${{ steps.resolve.outputs.tag_name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: mcp-server/package-lock.json

      - name: Install MCP server dependencies
        working-directory: mcp-server
        run: npm ci

      - name: Build MCP server (compiles validator scripts)
        working-directory: mcp-server
        run: npm run build

      - name: Resolve tag name
        id: resolve
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          DISPATCH_REF: ${{ github.event.inputs.ref }}
        run: |
          set -euo pipefail
          if [ "${EVENT_NAME}" = "workflow_dispatch" ]; then
            TAG_NAME="${DISPATCH_REF}"
          else
            TAG_NAME="${REF_NAME}"
          fi
          echo "tag_name=${TAG_NAME}" >> "${GITHUB_OUTPUT}"

      - name: Validate tag and package.json coherence
        id: validate
        shell: bash
        env:
          TAG_NAME: ${{ steps.resolve.outputs.tag_name }}
        run: |
          set -euo pipefail
          node mcp-server/dist/scripts/ci/validate_release_tag_cli.js \
            "${TAG_NAME}" \
            --package-json mcp-server/package.json

  # -------------------------------------------------------------------------
  # Build, test, and publish the npm package. The tests here are a sanity
  # gate — the main property / unit suite runs on every push via ci.yml —
  # but re-running them at publish time prevents shipping a broken build.
  # -------------------------------------------------------------------------
  publish-npm:
    name: publish-npm
    runs-on: ubuntu-latest
    needs: validate-tag
    permissions:
      contents: read
    env:
      TAG_VERSION: ${{ needs.validate-tag.outputs.tag_version }}
      TAG_NAME: ${{ needs.validate-tag.outputs.tag_name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20 (npm registry)
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"
          cache-dependency-path: mcp-server/package-lock.json

      - name: Install MCP server dependencies
        working-directory: mcp-server
        run: npm ci

      - name: Build MCP server
        working-directory: mcp-server
        run: npm run build

      - name: Install headless Godot ${{ env.GODOT_VERSION }}
        # Mirrors ci.yml — the property tests that shell out to
        # `godot` in the sanity gate require the binary on $PATH. Pin
        # to the same version ci.yml uses so the publish gate behaves
        # identically.
        uses: chickensoft-games/setup-godot@v2
        with:
          version: ${{ env.GODOT_VERSION }}
          use-dotnet: false
          include-templates: false

      - name: Pre-warm Godot global class cache
        # `class_name` resolution for types like `GDScriptValidator`
        # requires the global class cache. A fresh checkout has no
        # `.godot/global_script_class_cache.cfg`, so `--editor --quit`
        # once populates it before the sanity-gate property tests run
        # their first `godot --headless --script` subprocess.
        shell: bash
        run: godot --headless --editor --quit --path .

      - name: Run test suite (sanity gate)
        working-directory: mcp-server
        run: npm test

      - name: Publish to npm
        if: github.event_name == 'push' || github.event.inputs.dry_run == 'false'
        working-directory: mcp-server
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public

      - name: Publish dry-run
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run != 'false'
        working-directory: mcp-server
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --dry-run --access public
