# ForgeKit Core — Continuous Integration
#
# Required status checks for the protected `main` branch (configured in the
# GitHub repository settings → Branches → Branch protection rules):
#   - ci / tests-unit
#   - ci / tests-property
#   - ci / tests-gameplay
#   - ci / check-imports
#   - ci / language-policy
#   - ci / coverage-matrix
#   - ci / check-pr-template
#   - ci / schema-validation
#   - ci / error-codes-validation
#   - ci / tests-e2e (stdio-mode)
#   - ci / tests-e2e (headless-mode)
#
# The jobs below are intentionally named to match these required checks.
# Each job installs its own toolchain from scratch (Godot via
# `chickensoft-games/setup-godot`, Node.js via `actions/setup-node`, GUT
# pulled from the upstream GitHub release tarball) so the public template
# can stay slim — `addons/gut/` is not vendored in the repo.
#
# `tests-e2e` runs as a matrix over `mode: [stdio-mode, headless-mode]`
# so each cell registers as its own status check (the GitHub Actions
# convention is `<job-name> (<matrix-value>)`). Both cells must turn
# green for the overall `tests-e2e` requirement to pass.

name: ci

on:
  push:
    branches:
      - "**"
  pull_request:
    types: [opened, synchronize, reopened]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # CI runs against Godot 4.6.2 to match forgekit-rpg. The Core module
  # still supports Godot 4.3+ at the source level — 4.6.2 is the current
  # CI target, not a new minimum on the consumer side.
  GODOT_VERSION: "4.6.2"
  # Pinned GUT release pulled from the upstream GitHub release tarball
  # whenever a test job runs. Keep this in lock-step with the rpg repo.
  GUT_VERSION: "9.6.0"

jobs:
  # -------------------------------------------------------------------------
  # GUT unit tests executed against a headless Godot 4.3+ engine.
  # -------------------------------------------------------------------------
  tests-unit:
    name: tests-unit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install headless Godot ${{ env.GODOT_VERSION }}
        uses: chickensoft-games/setup-godot@v2
        with:
          version: ${{ env.GODOT_VERSION }}
          use-dotnet: false

      - name: Install GUT ${{ env.GUT_VERSION }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -f "addons/gut/gut_cmdln.gd" ]; then
            echo "GUT already present — skipping download"
            exit 0
          fi
          curl -fsSL -o /tmp/gut.tar.gz \
            "https://github.com/bitwes/Gut/archive/refs/tags/v${GUT_VERSION}.tar.gz"
          tar -xzf /tmp/gut.tar.gz -C /tmp
          mkdir -p addons
          mv "/tmp/Gut-${GUT_VERSION}/addons/gut" addons/gut
          test -f "addons/gut/gut_cmdln.gd"

      - name: Pre-warm Godot global class cache
        # A headless `--editor --quit` pass populates
        # `.godot/global_script_class_cache.cfg` so subsequent
        # `--script` invocations can resolve `class_name` references
        # across files. Idempotent.
        shell: bash
        run: godot --headless --editor --quit --path . || true

      - name: Run GUT unit tests
        shell: bash
        run: |
          set -euo pipefail
          godot --headless --path . --script addons/gut/gut_cmdln.gd \
            -gdir=res://tests/unit -gexit

  # -------------------------------------------------------------------------
  # Property-based tests: fast-check (TypeScript + Vitest) for the MCP server
  # and CoreFuzz (GDScript + GUT) for the Godot addons. Minimum of 100
  # iterations per property is enforced inside the tests themselves.
  # -------------------------------------------------------------------------
  tests-property:
    name: tests-property
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install headless Godot ${{ env.GODOT_VERSION }}
        uses: chickensoft-games/setup-godot@v2
        with:
          version: ${{ env.GODOT_VERSION }}
          use-dotnet: false

      - name: Install GUT ${{ env.GUT_VERSION }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -f "addons/gut/gut_cmdln.gd" ]; then
            echo "GUT already present — skipping download"
            exit 0
          fi
          curl -fsSL -o /tmp/gut.tar.gz \
            "https://github.com/bitwes/Gut/archive/refs/tags/v${GUT_VERSION}.tar.gz"
          tar -xzf /tmp/gut.tar.gz -C /tmp
          mkdir -p addons
          mv "/tmp/Gut-${GUT_VERSION}/addons/gut" addons/gut
          test -f "addons/gut/gut_cmdln.gd"

      - name: Set up Node.js 20
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: mcp-server/package-lock.json

      - name: Install MCP server dependencies
        working-directory: mcp-server
        run: npm ci

      - name: Pre-warm Godot global class cache
        # The property tests that shell out to Godot rely on class_name
        # resolution for types like `GDScriptValidator` across multiple
        # source files. In a fresh CI checkout
        # `.godot/global_script_class_cache.cfg` does not exist and
        # headless `--script` invocations cannot resolve cross-file
        # class references. Running `--editor --quit` once populates
        # the cache (and the asset-import cache) so every subsequent
        # spawn starts from a warm state.
        shell: bash
        run: godot --headless --editor --quit --path . || true

      - name: Run fast-check property tests (Vitest)
        # Vitest propagates the exit code from the fast-check runner, so a
        # failing property surfaces its counterexample in stderr and turns
        # the job red.
        working-directory: mcp-server
        run: npm test

      - name: Run CoreFuzz property tests (GUT)
        shell: bash
        run: |
          set -euo pipefail
          godot --headless --path . --script addons/gut/gut_cmdln.gd \
            -gdir=res://tests/property -gexit

      - name: Run static import-boundary tests (GUT)
        shell: bash
        run: |
          set -euo pipefail
          godot --headless --path . --script addons/gut/gut_cmdln.gd \
            -gdir=res://tests/static -gexit

  # -------------------------------------------------------------------------
  # Gameplay scenario tests driven by the MCP bridge in headless Godot.
  # `forgekit_rpg` is a `.gitkeep` placeholder in this public template, so
  # scenarios that depend on it (crafting, combat) correctly report as
  # pending rather than failing. The job passes when every non-pending
  # assertion holds.
  # -------------------------------------------------------------------------
  tests-gameplay:
    name: tests-gameplay
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install headless Godot ${{ env.GODOT_VERSION }}
        uses: chickensoft-games/setup-godot@v2
        with:
          version: ${{ env.GODOT_VERSION }}
          use-dotnet: false

      - name: Install GUT ${{ env.GUT_VERSION }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -f "addons/gut/gut_cmdln.gd" ]; then
            echo "GUT already present — skipping download"
            exit 0
          fi
          curl -fsSL -o /tmp/gut.tar.gz \
            "https://github.com/bitwes/Gut/archive/refs/tags/v${GUT_VERSION}.tar.gz"
          tar -xzf /tmp/gut.tar.gz -C /tmp
          mkdir -p addons
          mv "/tmp/Gut-${GUT_VERSION}/addons/gut" addons/gut
          test -f "addons/gut/gut_cmdln.gd"

      - name: Pre-warm Godot global class cache
        shell: bash
        run: godot --headless --editor --quit --path . || true

      - name: Run smoke tests (filesystem contract)
        # Smoke tests lock down the on-disk layout — addons/forgekit_core/
        # subdirs, CLAUDE.md + .cursorrules presence, NOTICE.md licence
        # entries, docs/SKILLS/ package, README Quickstart anchor, and the
        # forgekit_rpg placeholder directory. They run in every checkout,
        # with or without a paid module installed.
        shell: bash
        run: |
          set -euo pipefail
          godot --headless --path . --script addons/gut/gut_cmdln.gd \
            -gdir=res://tests/smoke -gexit

      - name: Run Gameplay Test Runner scenarios
        # GUT-driven integration tests under `tests/integration/` exercise
        # the end-to-end flow through the public API. Scenarios that
        # depend on `addons/forgekit_rpg/` (which ships as a `.gitkeep`
        # placeholder in this public template) self-report as pending
        # via `pending("forgekit_rpg module not installed")`. The job
        # passes when every non-pending assertion holds.
        shell: bash
        run: |
          set -euo pipefail
          godot --headless --path . --script addons/gut/gut_cmdln.gd \
            -gdir=res://tests/integration -gexit

  # -------------------------------------------------------------------------
  # Core boundary / import-rule validator. Runs the same
  # `project.check_imports` implementation that the property tests
  # exercise, but against the repository root so any newly-committed
  # cross-module import turns the status check red.
  # -------------------------------------------------------------------------
  check-imports:
    name: check-imports
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node.js 20
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: mcp-server/package-lock.json

      - name: Install and build MCP server
        working-directory: mcp-server
        run: |
          set -euo pipefail
          npm ci
          npm run build

      - name: Run project.check_imports against the repository root
        shell: bash
        run: node tools/run_check_imports.mjs

  # -------------------------------------------------------------------------
  # Language policy validator — ensures the public repository content is in
  # English (Markdown, GDScript, TypeScript, comments, commit messages, and
  # file names).
  # -------------------------------------------------------------------------
  language-policy:
    name: language-policy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          # Fetch the full history so the validator can inspect commit
          # messages.
          fetch-depth: 0

      - name: Set up Node.js 20
        uses: actions/setup-node@v5
        with:
          node-version: "20"

      - name: Validate language policy
        shell: bash
        run: node tools/validate-language-policy.js

  # -------------------------------------------------------------------------
  # Coverage matrix idempotency check — regenerates `docs/coverage_matrix.md`
  # from the spec and the test annotations, then fails when the generated
  # file differs from the committed copy. Ensures the matrix never drifts
  # from the source of truth.
  # -------------------------------------------------------------------------
  coverage-matrix:
    name: coverage-matrix
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node.js 20
        uses: actions/setup-node@v5
        with:
          node-version: "20"

      - name: Regenerate coverage matrix and diff against the committed copy
        shell: bash
        env:
          # Point the generator at the repo-vendored spec when present;
          # the script falls back to `$HOME/dummy/.kiro/...` only in
          # local development.
          FORGEKIT_SPEC_DIR: ${{ github.workspace }}/.kiro/specs/action-rpg-starter-kit
        run: |
          set -euo pipefail
          if [ ! -d "${FORGEKIT_SPEC_DIR}" ]; then
            echo "coverage-matrix: spec directory not vendored in the repo — skipping"
            exit 0
          fi
          node tools/generate-coverage-matrix.js
          git diff --exit-code -- docs/coverage_matrix.md || {
            echo "coverage-matrix: docs/coverage_matrix.md is stale." >&2
            echo "Run 'node tools/generate-coverage-matrix.js' and commit the result." >&2
            exit 1
          }

  # -------------------------------------------------------------------------
  # Pull request template completeness check. Only runs for pull requests;
  # fails with the `-32014 PR_TEMPLATE_INCOMPLETE` error code when any of
  # the four required sections is empty.
  # -------------------------------------------------------------------------
  check-pr-template:
    name: check-pr-template
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node.js 20
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: mcp-server/package-lock.json

      - name: Install and build MCP server
        working-directory: mcp-server
        run: |
          set -euo pipefail
          npm ci
          npm run build

      - name: Validate pull request description
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        shell: bash
        run: printf '%s' "${PR_BODY:-}" | node mcp-server/dist/scripts/ci/check-pr-template.js

  # -------------------------------------------------------------------------
  # Schema validation — confirms every tool in `mcp-server/profiles.json`
  # has a registered entry in `src/schema/tool_schemas.ts` and that every
  # input/output schema compiles cleanly through Ajv 8 (JSON Schema Draft
  # 2020-12). Driven by `scripts/ci/validate-schemas.ts`.
  # -------------------------------------------------------------------------
  schema-validation:
    name: schema-validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node.js 20
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: mcp-server/package-lock.json

      - name: Install and build MCP server
        working-directory: mcp-server
        run: |
          set -euo pipefail
          npm ci
          npm run build

      - name: Validate tool schemas against profiles.json
        working-directory: mcp-server
        shell: bash
        run: node dist/scripts/ci/validate-schemas.js

  # -------------------------------------------------------------------------
  # Error code validation — confirms every `throw new (Cli|Cross)
  # DispatchError(code, ...)` site in `mcp-server/src/**/*.ts` references a
  # numeric code registered in `src/dispatcher/error_codes.ts`. Driven by
  # `scripts/validate-error-codes.ts` (also exposed as the `lint:errors`
  # npm script).
  # -------------------------------------------------------------------------
  error-codes-validation:
    name: error-codes-validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node.js 20
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: mcp-server/package-lock.json

      - name: Install MCP server dependencies
        working-directory: mcp-server
        run: npm ci

      - name: Validate dispatch error codes
        working-directory: mcp-server
        shell: bash
        run: npm run lint:errors

  # -------------------------------------------------------------------------
  # End-to-end tests — exercises the six E2E scenarios under
  # `mcp-server/test/e2e/` (combat hitbox, crafting full scenario, editor
  # scene round trip, CLI run_unit, cross-channel transaction, auth_token
  # enforcement). Each scenario spawns a real Godot 4.6.2 process and
  # connects through the MCP transport.
  #
  # The job runs as a `mode: [stdio-mode, headless-mode]` matrix so each
  # cell surfaces as its own required status check on `main`. Both cells
  # execute the same Vitest discovery (`test/e2e/**`); the `mode` value is
  # exported as `MCP_E2E_MODE` so future test code can branch on it
  # without changing the CI surface.
  # -------------------------------------------------------------------------
  tests-e2e:
    name: tests-e2e
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        mode: [stdio-mode, headless-mode]
    env:
      MCP_E2E_MODE: ${{ matrix.mode }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install headless Godot ${{ env.GODOT_VERSION }}
        uses: chickensoft-games/setup-godot@v2
        with:
          version: ${{ env.GODOT_VERSION }}
          use-dotnet: false

      - name: Install GUT ${{ env.GUT_VERSION }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -f "addons/gut/gut_cmdln.gd" ]; then
            echo "GUT already present — skipping download"
            exit 0
          fi
          curl -fsSL -o /tmp/gut.tar.gz \
            "https://github.com/bitwes/Gut/archive/refs/tags/v${GUT_VERSION}.tar.gz"
          tar -xzf /tmp/gut.tar.gz -C /tmp
          mkdir -p addons
          mv "/tmp/Gut-${GUT_VERSION}/addons/gut" addons/gut
          test -f "addons/gut/gut_cmdln.gd"

      - name: Set up Node.js 20
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: mcp-server/package-lock.json

      - name: Install MCP server dependencies
        working-directory: mcp-server
        run: npm ci

      - name: Pre-warm Godot global class cache
        # The E2E scenarios shell out to Godot with `class_name`
        # references resolved across multiple files. Running
        # `--editor --quit` once populates
        # `.godot/global_script_class_cache.cfg` so the spawned
        # processes start from a warm state.
        shell: bash
        run: godot --headless --editor --quit --path . || true

      - name: Run E2E test suite (mode=${{ matrix.mode }})
        working-directory: mcp-server
        env:
          # Surface the matrix value to the spawned Godot processes so
          # the fixture projects can branch when needed.
          MCP_E2E_MODE: ${{ matrix.mode }}
        shell: bash
        run: npm test -- test/e2e/
