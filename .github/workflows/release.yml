# ForgeKit Core — GitHub Release publisher.
#
# Triggered by pushing a tag matching `v*` (SemVer 2.0 is enforced by the
# `validate-tag` job). The `release` job packages the Godot addon, generates
# a changelog entry with conventional-changelog-cli, and publishes a GitHub
# Release with the zipped addon attached.
#
# `workflow_dispatch` is exposed so maintainers can exercise the pipeline
# end-to-end without creating a real release. When `dry_run` is true every
# destructive step (GitHub Release publish, AssetLib submission) is
# skipped; the zipped addon and the generated changelog are still uploaded
# as workflow artifacts so the output can be inspected.

name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Skip the GitHub Release publish step — validate, build the ZIP, and upload it as an artifact only."
        type: boolean
        required: false
        default: true
      ref:
        description: "Simulated tag name when dry-running (e.g. v0.0.0). Used only when dry_run is true."
        type: string
        required: false
        default: "v0.0.0"

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # -------------------------------------------------------------------------
  # Shared validation — the same job is duplicated (by design) in
  # npm-publish.yml so each workflow is independently triggerable. Keep the
  # two definitions in sync.
  # -------------------------------------------------------------------------
  validate-tag:
    name: validate-tag
    runs-on: ubuntu-latest
    outputs:
      tag_version: ${{ steps.validate.outputs.tag_version }}
      tag_name: ${{ steps.resolve.outputs.tag_name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node.js 20
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: mcp-server/package-lock.json

      - name: Install MCP server dependencies
        working-directory: mcp-server
        run: npm ci

      - name: Build MCP server (compiles validator scripts)
        working-directory: mcp-server
        run: npm run build

      - name: Resolve tag name
        id: resolve
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          DISPATCH_REF: ${{ github.event.inputs.ref }}
        run: |
          set -euo pipefail
          if [ "${EVENT_NAME}" = "workflow_dispatch" ]; then
            TAG_NAME="${DISPATCH_REF}"
          else
            TAG_NAME="${REF_NAME}"
          fi
          echo "tag_name=${TAG_NAME}" >> "${GITHUB_OUTPUT}"

      - name: Validate tag and package.json coherence
        id: validate
        shell: bash
        env:
          TAG_NAME: ${{ steps.resolve.outputs.tag_name }}
        run: |
          set -euo pipefail
          node mcp-server/dist/scripts/ci/validate_release_tag_cli.js \
            "${TAG_NAME}" \
            --package-json mcp-server/package.json

  # -------------------------------------------------------------------------
  # Package the Godot addon, generate changelog notes, and publish the
  # GitHub Release.
  # -------------------------------------------------------------------------
  release:
    name: release
    runs-on: ubuntu-latest
    needs: validate-tag
    permissions:
      contents: write
    env:
      TAG_VERSION: ${{ needs.validate-tag.outputs.tag_version }}
      TAG_NAME: ${{ needs.validate-tag.outputs.tag_name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          # conventional-changelog-cli needs the full history to compute
          # the release notes window.
          fetch-depth: 0

      - name: Set up Node.js 20
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: mcp-server/package-lock.json

      - name: Generate release notes (latest entry only)
        shell: bash
        run: |
          set -euo pipefail
          npx -y conventional-changelog-cli@^4 \
            -p conventionalcommits \
            -r 1 > RELEASE_NOTES.md
          echo "---- RELEASE_NOTES.md ----"
          cat RELEASE_NOTES.md

      - name: Regenerate full CHANGELOG.md
        shell: bash
        run: |
          set -euo pipefail
          npx -y conventional-changelog-cli@^4 \
            -p conventionalcommits \
            -r 0 > CHANGELOG.md

      - name: Package addon ZIP
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -d "addons/forgekit_core" ]; then
            echo "addons/forgekit_core/ is missing — cannot build release archive"
            exit 1
          fi
          zip -r "forgekit-core-${TAG_VERSION}.zip" addons/forgekit_core

      - name: Upload artifacts (always)
        uses: actions/upload-artifact@v6
        with:
          name: forgekit-core-${{ env.TAG_VERSION }}
          path: |
            forgekit-core-${{ env.TAG_VERSION }}.zip
            RELEASE_NOTES.md
            CHANGELOG.md
          if-no-files-found: error

      - name: Publish GitHub Release
        if: github.event_name == 'push' || github.event.inputs.dry_run == 'false'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: ${{ env.TAG_NAME }}
          body_path: RELEASE_NOTES.md
          files: forgekit-core-${{ env.TAG_VERSION }}.zip
          draft: false
          prerelease: false

      # Optional Godot AssetLib submission.
      #
      # Godot AssetLib does not expose a stable API for automated publishing
      # at the time of writing, so maintainers follow the manual procedure
      # documented in CONTRIBUTING.md after this workflow completes. The
      # step below is intentionally disabled and preserved as a hook for a
      # future automation.
      - name: Submit to Godot AssetLib (manual step — disabled)
        if: false
        shell: bash
        run: |
          echo "Godot AssetLib submission is a manual step — see CONTRIBUTING.md"
